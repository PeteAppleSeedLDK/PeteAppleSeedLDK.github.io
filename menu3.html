<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petronyx - MENÜ 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 300;
            background: linear-gradient(180deg, #f5f7fa 0%, #e4e7eb 100%);
            min-height: 100vh;
            color: #1a202c;
        }
        .header {
            width: 100%;
            height: 180px;
            background: url('header.png') center/cover no-repeat;
        }
        .container { display: flex; min-height: calc(100vh - 180px); }
        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #e8ecf1 0%, #dde3eb 100%);
            padding: 30px 20px;
            border-right: 2px solid rgba(74, 222, 128, 0.3);
        }
        .menu { list-style: none; }
        .menu li { margin-bottom: 8px; }
        .menu a {
            display: block;
            padding: 12px 16px;
            color: #4a5568;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 15px;
            font-weight: 400;
        }
        .menu a:hover, .menu a.active {
            background: rgba(74, 222, 128, 0.15);
            color: #16a34a;
        }
        .menu a.active { border-left: 3px solid #16a34a; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card h2 {
            font-family: 'Space Grotesk', sans-serif;
            color: #16a34a;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }
        .card h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #16a34a;
            border-radius: 2px;
        }
        .content-text { line-height: 1.8; color: #374151; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #e2e8f0; color: #9ca3af; font-size: 12px; font-weight: 400; }
        @media (max-width: 768px) {
            .header { height: 120px; }
            .container { flex-direction: column; }
            .sidebar { width: 100%; padding: 20px; }
            .main { padding: 20px; }
        }
    </style>
</head>
<body>
    <header class="header"></header>
    <div class="container">
        <nav class="sidebar">
            <ul class="menu">
                <li><a href="index.html">Startseite</a></li>
                <li><a href="menu3.html" class="active">MENÜ 3</a></li>
                <li><a href="menu2.html">MENÜ 2</a></li>
                <li><a href="menu3.html">MENÜ 3</a></li>
                <li><a href="menu4.html">MENÜ 4</a></li>
            </ul>
        </nav>
        <main class="main">
            <div class="card">
                <h2>MENÜ 3</h2>
                <div class="content-text">
                    <p>Hier folgt der Inhalt für MENÜ 3.</p>
                </div>
            </div>
            <div class="footer">
                <p>© 2026 by CP | unter Mitwirkung meines Azubis</p>
            </div>
        </main>
    </div>
</body>
</html>
